<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Descargar de YouTube</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900 min-h-screen pt-20">
  <!-- Menú superior fijo (centrado) -->
  <nav class="fixed top-0 inset-x-0 bg-white/80 backdrop-blur border-b border-gray-200/60 shadow-sm">
    <div class="max-w-4xl mx-auto px-4 py-3 flex justify-center">
      <div class="inline-flex items-center gap-2 bg-gray-100/70 rounded-full p-1 ring-1 ring-gray-200">
        <a href="{{ url_for('descargar') }}"
          class="px-4 py-1.5 rounded-full text-sm font-semibold text-white bg-red-600">
          Descargar
        </a>
        <a href="{{ url_for('separar') }}"
          class="px-4 py-1.5 rounded-full text-sm font-semibold text-gray-700 hover:text-red-700 hover:bg-white transition">
          Separar / Mutear
        </a>
        <a href="{{ url_for('pistas') }}"
          class="px-4 py-1.5 rounded-full text-sm font-semibold text-gray-700 hover:text-red-700 hover:bg-white transition">
          Pistas (Local)
        </a>
      </div>
    </div>
  </nav>

  <div class="w-full max-w-3xl mx-auto px-4 bg-white p-6 rounded-xl shadow-xl">
    <div class="flex items-center justify-between">
      <h1 class="text-2xl font-bold mb-6 text-red-600">Descargar de YouTube</h1>
    </div>

    {% if error %}
      <div class="mb-4 bg-red-100 border border-red-400 text-red-700 p-3 rounded">{{ error }}</div>
    {% endif %}

    <!-- action explícito -->
    <form id="dlForm" method="POST" action="{{ url_for('descargar') }}" class="space-y-6">

      <!-- PASO 1 -->
      <div class="space-y-2">
        <div class="flex items-center gap-2">
          <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-blue-600 text-white text-sm font-bold">1</span>
          <h3 class="text-base font-semibold">Pegá la URL del video</h3>
        </div>
        <input id="url" name="url" type="url" required value="{{ url or '' }}"
              class="w-full p-3 bg-gray-200 rounded-md focus:outline-none focus:ring-2 focus:ring-red-500" />
      </div>

      {% if not formats %}
        <!-- PASO 2 -->
        <div id="step2" class="space-y-2">
          <div class="flex items-center gap-2">
            <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-blue-600 text-white text-sm font-bold">2</span>
            <h3 class="text-base font-semibold">Buscá la calidad</h3>
          </div>
          <button id="submitBtn" type="submit"
                  class="w-full bg-red-600 hover:bg-red-700 text-white font-semibold py-3 rounded-md transition">
            Buscar calidad
          </button>
        </div>
      {% else %}

        <!-- PASO 3: Elegí la calidad y descargá -->
        <div id="step3" class="mt-6">
          <div class="flex items-center gap-3 mb-2">
            <span class="inline-flex items-center justify-center w-7 h-7 rounded-full bg-blue-600 text-white text-sm font-bold">3</span>
            <h3 class="font-semibold">Elegí la calidad y descargá</h3>
          </div>

          <div id="downloadForm" class="space-y-3">
            <label class="block text-sm font-medium">Formato</label>
            <select
              name="format_id"
              id="format_id"
              class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"
              required
            >
              {% for f in formats %}
                {% set height = f.get('height') %}
                {% set res    = f.get('resolution') %}
                {% set note   = f.get('format_note') %}
                {% set fps    = f.get('fps') %}
                {% set ext    = f.get('ext') %}
                <option value="{{ f['format_id'] }}">
                  {%- if height %}{{ height }}p
                  {%- elif res %}{{ res }}
                  {%- elif note %}{{ note|title }}
                  {%- else %}{{ f['format_id'] }}
                  {%- endif -%}
                  {%- if fps %} {{ fps }}fps{% endif -%}
                  {%- if ext %} · {{ ext|upper }}{% endif -%}
                </option>
              {% endfor %}
            </select>

            <!-- Botones: Descargar (2/3) + Borrar (1/3) -->       
            <label class="block text-sm font-medium">Tipo de archivo</label>
            <select
              name="output_ext"
              id="output_ext"
              class="w-full rounded-md border border-gray-300 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"
              required
            >
              <option value="mp4">MP4 (video)</option>
              <option value="wav">WAV (audio)</option>
            </select>

            <!-- Botones: Descargar (2/3) + Borrar (1/3) -->
            <div class="grid grid-cols-3 gap-3 pt-2">
              <button id="downloadBtn" type="submit"
                class="col-span-2 bg-red-600 hover:bg-red-700 text-white font-semibold px-4 py-2 rounded-md transition">
                Descargar
              </button>

              <button id="clearBtn" type="button"
                class="col-span-1 bg-gray-200 hover:bg-gray-300 text-gray-800 font-semibold px-4 py-2 rounded-md transition">
                Borrar
              </button>
            </div>
          </div>
        </div>
      {% endif %}

    </form>
  </div>

  <!-- Popup/Toast -->
  <div id="toast" class="fixed top-5 left-1/2 -translate-x-1/2 z-50 hidden">
    <div class="bg-green-600 text-white px-4 py-3 rounded-lg shadow-lg">
      Archivo descargado
    </div>
  </div>

  <script>
    (function () {
      const form = document.getElementById('dlForm');
      if (!form) return;

      form.addEventListener('submit', async function (e) {
        // Interceptamos SOLO cuando es el segundo paso (hay format_id a elegir).
        const fmtSel = form.querySelector('select[name="format_id"]');
        const hasFormatSelect = !!(fmtSel && fmtSel.options && fmtSel.options.length);
        if (!hasFormatSelect) return; // Dejar POST normal para "Buscar calidad"

        e.preventDefault();

        const action = form.getAttribute('action');
        const fd = new FormData(form);

        // Evitar doble click
        const btn = document.getElementById('downloadBtn') || document.getElementById('submitBtn');
        const oldLabel = btn.textContent;
        btn.disabled = true;
        btn.textContent = 'Descargando…';

        try {
          const resp = await fetch(action, { method: 'POST', body: fd });
          if (!resp.ok) throw new Error('Descarga falló');

          // Recibimos el archivo y lo descargamos como blob
          const blob = await resp.blob();
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;

          // Tomamos nombre del header si viene, si no, uno default
          const cd = resp.headers.get('Content-Disposition') || '';
          const match = /filename\*?=(?:UTF-8''|")?([^;\r\n"]+)/i.exec(cd);
          const cd = resp.headers.get('Content-Disposition') || '';
          let filename = match ? decodeURIComponent(match[1].replace(/"/g, '')) : 'video.mp4';
          a.download = filename;
          document.body.appendChild(a);
          a.click();
          a.remove();
          URL.revokeObjectURL(url);

          // Mostrar popup y volver al estado inicial después de 4s
          showToast('Archivo descargado');
          setTimeout(() => {
            window.location.href = "{{ url_for('descargar') }}";
          }, 4000);

        } catch (err) {
          console.error(err);
          showToast('Hubo un error en la descarga', true);
        } finally {
          btn.disabled = false;
          btn.textContent = oldLabel;
        }
      });

      function showToast(message, error = false) {
        const toast = document.getElementById('toast');
        if (!toast) return;
        toast.querySelector('div').textContent = message;
        toast.querySelector('div').className =
          (error
            ? 'bg-red-700 text-white px-4 py-3 rounded-lg shadow-lg'
            : 'bg-green-600 text-white px-4 py-3 rounded-lg shadow-lg');
        toast.classList.remove('hidden');
        setTimeout(() => toast.classList.add('hidden'), 4000);
      }
    })();  

    (function () {
      const form     = document.getElementById('dlForm');
      const clearBtn = document.getElementById('clearBtn');
      if (!clearBtn) return;

      clearBtn.addEventListener('click', function (e) {
        e.preventDefault();
        if (form) form.reset();
        // Volver al estado inicial (Paso 1 + Paso 2 visibles)
        window.location.href = "{{ url_for('descargar') }}";
      });
    })();

  </script>
</body>
</html>
